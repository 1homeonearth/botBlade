version: 1
last_updated: "2026-05-20"
policy:
  anti_vendoring:
    - Do not vendor full GPL application codebases (Termux app, OpenKeychain app) into botBlade.
    - External app integrations are allowed via intents/providers/platform APIs with policy gates.
  license_and_provenance_requirements:
    - Any dependency/adopted code requires license compatibility, provenance validation, pinning, tests, attribution, and rollback plan.
entries:
  - id: termux_app
    name: termux/termux-app
    usage_type: external_app_integration
    status: reference_only
    license: GPL-3.0-only
    notes:
      - External integration only; no full-app vendoring.

  - id: open_keychain_app
    name: open-keychain/open-keychain
    usage_type: external_app_integration
    status: reference_only
    license: GPL-3.0
    notes:
      - External integration only; no full-app vendoring.

  - id: openpgp_api
    name: open-keychain/openpgp-api
    usage_type: candidate_dependency
    status: review_required
    license: Apache-2.0
    notes:
      - Candidate provider-compatibility library; requires provenance review and tests before adoption.

  - id: cargo_ndk
    name: cargo-ndk
    usage_type: development_dependency_candidate
    status: review_required
    license: unknown
    notes:
      - Candidate Android Rust build helper; verify license/provenance and pin version.

  - id: android_platform_features
    name: Android platform security/storage features
    usage_type: platform_feature_bundle
    status: candidate
    license: platform
    components:
      - Android Keystore
      - Android Storage Access Framework (SAF)
    notes:
      - Prefer platform APIs over vendored app internals for key and file operations.

  - id: github
    name: GitHub
    usage_type: commercial_service_integration_candidate
    status: review_required
    license: service_terms
    notes:
      - Integrate via approved APIs/tokens with bounded scopes and audit.

  - id: password_managers
    name: 1Password / Bitwarden / Proton Pass
    usage_type: commercial_service_integration_candidate
    status: review_required
    license: service_terms
    notes:
      - Use autofill or explicit handoff flows; avoid raw secret persistence.

  - id: cloud_storage
    name: Google Drive / Dropbox / OneDrive
    usage_type: commercial_service_integration_candidate
    status: review_required
    license: service_terms
    notes:
      - Use SAF/share/export flows with scope-limited user consent.

  - id: messaging_platforms
    name: Slack / Discord / Telegram
    usage_type: commercial_service_integration_candidate
    status: review_required
    license: service_terms
    notes:
      - Support intent/deep-link/share patterns and policy-gated export behavior.

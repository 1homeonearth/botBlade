name: BotBlade Android APKs

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: android-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref_name || github.run_id }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        shell: bash
        run: |
          set -euo pipefail
          git init .
          git fetch --depth=1 "https://github.com/${GITHUB_REPOSITORY}.git" "${GITHUB_SHA}"
          git checkout --force FETCH_HEAD
      - name: Resolve build version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          seq="${GITHUB_RUN_NUMBER}"
          version="0.$(printf '%03d' "$seq")"
          echo "seq=$seq" >> "$GITHUB_OUTPUT"
          echo "version_code=$seq" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Validate repository preconditions
        shell: bash
        run: |
          set -euo pipefail
          [ -f app/build.gradle.kts ] || { echo '::error::Missing app/build.gradle.kts.'; exit 1; }
          [ -d app/src/main ] || { echo '::error::Missing Android source directory app/src/main.'; exit 1; }
          [ -f gradlew ] || { echo '::error::Missing Gradle wrapper.'; exit 1; }
          chmod +x ./gradlew
      - name: Verify Java and Android home
        shell: bash
        run: |
          set -euo pipefail
          java -version
          echo "ANDROID_HOME=${ANDROID_HOME:-}"
          if [[ -z "${ANDROID_HOME:-}" ]]; then
            echo '::error::ANDROID_HOME is not set on this runner.'
            exit 1
          fi
      - name: Extract app metadata
        id: meta
        shell: bash
        env:
          VERSION_SEQ: ${{ steps.version.outputs.seq }}
          VERSION_CODE: ${{ steps.version.outputs.version_code }}
        run: |
          set -euo pipefail
          metadata_output="$(./gradlew -q :app:printResolvedVersionMetadata -PVERSION_SEQ="$VERSION_SEQ" -PVERSION_CODE="$VERSION_CODE" --no-daemon)"
          version_name="$(printf '%s\n' "$metadata_output" | sed -n 's/^VERSION_NAME=//p' | tail -n1)"
          version_code="$(printf '%s\n' "$metadata_output" | sed -n 's/^VERSION_CODE=//p' | tail -n1)"
          if [[ -z "$version_name" || -z "$version_code" ]]; then
            echo '::error::Failed to extract VERSION_NAME/VERSION_CODE from Gradle output.'
            printf '%s\n' "$metadata_output"
            exit 1
          fi
          echo "app_version_name=$version_name" >> "$GITHUB_OUTPUT"
          echo "app_version_code=$version_code" >> "$GITHUB_OUTPUT"
      - name: Build CI APK
        shell: bash
        env:
          VERSION_SEQ: ${{ steps.version.outputs.seq }}
          VERSION_CODE: ${{ steps.version.outputs.version_code }}
        run: ./gradlew :app:assembleProdCi -PVERSION_SEQ="$VERSION_SEQ" -PVERSION_CODE="$VERSION_CODE" --no-daemon --stacktrace
      - name: Verify APK output
        shell: bash
        run: |
          set -euo pipefail
          ci_apk=app/build/outputs/apk/prod/ci/app-prod-ci.apk
          [[ -f "$ci_apk" ]] || { echo "::error::Missing CI APK: $ci_apk"; exit 1; }
          sha256sum "$ci_apk"
      - name: Write workflow summary
        shell: bash
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Android build summary
          - CI APK built: yes
          - App version name: ${{ steps.meta.outputs.app_version_name }}
          - App version code: ${{ steps.meta.outputs.app_version_code }}
          EOF

  publish_debug_release:
    needs: build
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        shell: bash
        run: |
          set -euo pipefail
          git init .
          git fetch --depth=250 --tags "https://github.com/${GITHUB_REPOSITORY}.git" "${GITHUB_SHA}"
          git checkout --force FETCH_HEAD
      - name: Resolve release version
        id: release_version
        shell: bash
        run: |
          set -euo pipefail
          latest_tag="$(git tag -l 'v0.[0-9][0-9][0-9]' | sort -V | tail -n 1)"
          if [[ -z "$latest_tag" ]]; then
            seq=1
          else
            numeric="${latest_tag#v0.}"
            seq=$((10#$numeric + 1))
          fi
          version="0.$(printf '%03d' "$seq")"
          version_code=$((100000 + seq))
          tag="v${version}"
          echo "seq=$seq" >> "$GITHUB_OUTPUT"
          echo "version_code=$version_code" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "previous_tag=$latest_tag" >> "$GITHUB_OUTPUT"
      - name: Build release CI APK
        shell: bash
        env:
          VERSION_SEQ: ${{ steps.release_version.outputs.seq }}
          VERSION_CODE: ${{ steps.release_version.outputs.version_code }}
        run: ./gradlew :app:assembleProdCi -PVERSION_SEQ="$VERSION_SEQ" -PVERSION_CODE="$VERSION_CODE" --no-daemon --stacktrace
      - name: Publish debug release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.release_version.outputs.version }}
          TAG: ${{ steps.release_version.outputs.tag }}
          PREVIOUS_TAG: ${{ steps.release_version.outputs.previous_tag }}
        run: |
          set -euo pipefail
          mkdir -p dist/release
          cp app/build/outputs/apk/prod/ci/app-prod-ci.apk "dist/release/botBlade-ci-v${VERSION}.apk"
          (cd dist/release && sha256sum "botBlade-ci-v${VERSION}.apk" > SHA256SUMS.txt)
          {
            echo "## BotBlade ${VERSION} Debug"
            echo
            echo "### Changes"
            if [[ -n "$PREVIOUS_TAG" ]]; then
              git log --pretty=format:'- %s (%h)' "${PREVIOUS_TAG}..HEAD"
            else
              git log --pretty=format:'- %s (%h)' -n 50
            fi
          } > dist/release/RELEASE_NOTES.md
          gh release create "$TAG" "dist/release/botBlade-ci-v${VERSION}.apk" dist/release/SHA256SUMS.txt --repo "$GITHUB_REPOSITORY" --target "$GITHUB_SHA" --title "BotBlade $VERSION CI" --notes-file dist/release/RELEASE_NOTES.md --prerelease

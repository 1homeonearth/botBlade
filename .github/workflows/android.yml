name: BotBlade Android APKs

on:
  push:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: android-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref_name || github.run_id }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      app_version_name: ${{ steps.meta.outputs.app_version_name }}
      app_version_code: ${{ steps.meta.outputs.app_version_code }}
    steps:
      - name: Checkout repository
        shell: bash
        run: |
          set -euo pipefail
          git init .
          git fetch --no-tags --depth=1 "https://github.com/${GITHUB_REPOSITORY}.git" "${GITHUB_SHA}"
          git checkout --force FETCH_HEAD
      - name: Resolve build version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == "refs/heads/main" && "${GITHUB_EVENT_NAME}" == "push" ]]; then
            git fetch --tags --depth=250 "https://github.com/${GITHUB_REPOSITORY}.git"
            latest_tag="$(git tag -l 'v0.[0-9][0-9][0-9]' | sort -V | tail -n 1)"
            if [[ -z "$latest_tag" ]]; then
              seq=1
            else
              numeric="${latest_tag#v0.}"
              seq=$((10#$numeric + 1))
            fi
          else
            seq="${GITHUB_RUN_NUMBER}"
          fi
          echo "seq=$seq" >> "$GITHUB_OUTPUT"
      - name: Validate repository preconditions
        shell: bash
        run: |
          set -euo pipefail
          [ -f app/build.gradle.kts ] || { echo '::error::Missing app/build.gradle.kts.'; exit 1; }
          [ -d app/src/main ] || { echo '::error::Missing Android source directory app/src/main.'; exit 1; }
          [ -f gradlew ] || { echo '::error::Missing Gradle wrapper.'; exit 1; }
          chmod +x ./gradlew
      - name: Verify Java and Android home
        shell: bash
        run: |
          set -euo pipefail
          java -version
          echo "ANDROID_HOME=${ANDROID_HOME:-}"
          if [[ -z "${ANDROID_HOME:-}" ]]; then
            echo '::error::ANDROID_HOME is not set on this runner.'
            exit 1
          fi
      - name: Extract app metadata
        id: meta
        shell: bash
        env:
          VERSION_SEQ: ${{ steps.version.outputs.seq }}
        run: |
          set -euo pipefail
          metadata_output="$(./gradlew -q :app:printResolvedVersionMetadata -PVERSION_SEQ="$VERSION_SEQ" --no-daemon)"
          version_name="$(printf '%s\n' "$metadata_output" | sed -n 's/^VERSION_NAME=//p' | tail -n1)"
          version_code="$(printf '%s\n' "$metadata_output" | sed -n 's/^VERSION_CODE=//p' | tail -n1)"
          if [[ -z "$version_name" || -z "$version_code" ]]; then
            echo '::error::Failed to extract VERSION_NAME/VERSION_CODE from Gradle output.'
            printf '%s\n' "$metadata_output"
            exit 1
          fi
          echo "app_version_name=$version_name" >> "$GITHUB_OUTPUT"
          echo "app_version_code=$version_code" >> "$GITHUB_OUTPUT"
      - name: Build debug and release APKs
        shell: bash
        env:
          VERSION_SEQ: ${{ steps.version.outputs.seq }}
        run: ./gradlew :app:assembleDebug :app:assembleRelease -PVERSION_SEQ="$VERSION_SEQ" --no-daemon --stacktrace
      - name: Stage APK artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/android
          debug_apk=app/build/outputs/apk/prod/debug/app-prod-debug.apk
          release_unsigned_apk=app/build/outputs/apk/prod/release/app-prod-release-unsigned.apk
          [[ -f "$debug_apk" ]] || { echo "::error::Missing debug APK: $debug_apk"; exit 1; }
          [[ -f "$release_unsigned_apk" ]] || { echo "::error::Missing unsigned release APK: $release_unsigned_apk"; exit 1; }
          cp "$debug_apk" dist/android/bot-blade-debug.apk
          cp "$release_unsigned_apk" dist/android/bot-blade-release-unsigned.apk
          (cd dist/android && sha256sum bot-blade-debug.apk bot-blade-release-unsigned.apk > SHA256SUMS.txt)
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: botblade-android-apks
          path: dist/android/
          retention-days: 14
      - name: Write workflow summary
        shell: bash
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Android build summary
          - Debug APK built: yes
          - Unsigned release APK built: yes
          - App version name: ${{ steps.meta.outputs.app_version_name }}
          - App version code: ${{ steps.meta.outputs.app_version_code }}
          EOF

  publish_debug_release:
    name: publish debug release
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - name: Checkout repository metadata
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git init .
          gh auth setup-git
          git fetch --depth=250 --tags "https://github.com/${GITHUB_REPOSITORY}.git" "${GITHUB_SHA}"
          git checkout --force FETCH_HEAD
      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          latest_tag="$(git tag -l 'v0.[0-9][0-9][0-9]' | sort -V | tail -n 1)"
          if [[ -z "$latest_tag" ]]; then
            seq=1
          else
            numeric="${latest_tag#v0.}"
            seq=$((10#$numeric + 1))
          fi
          version="0.$(printf '%03d' "$seq")"
          tag="v${version}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "previous_tag=$latest_tag" >> "$GITHUB_OUTPUT"
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: botblade-android-apks
          path: dist/android
      - name: Stage release assets and notes
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
          PREVIOUS_TAG: ${{ steps.version.outputs.previous_tag }}
        run: |
          set -euo pipefail
          mkdir -p dist/release
          source_apk=dist/android/bot-blade-debug.apk
          [[ -f "$source_apk" ]] || { echo "::error::Missing debug APK artifact: $source_apk"; exit 1; }
          cp "$source_apk" "dist/release/bot-blade-debug-v${VERSION}.apk"
          (cd dist/release && sha256sum "bot-blade-debug-v${VERSION}.apk" > SHA256SUMS.txt)
          {
            echo "## BotBlade ${VERSION} Debug"
            echo
            echo "Debug APK generated automatically after merge to main."
            echo
            echo "### Changes"
            if [[ -n "$PREVIOUS_TAG" ]]; then
              git log --pretty=format:'- %s (%h)' "${PREVIOUS_TAG}..HEAD"
            else
              git log --pretty=format:'- %s (%h)' -n 50
            fi
          } > dist/release/RELEASE_NOTES.md
      - name: Publish GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          apk_file="dist/release/bot-blade-debug-v${VERSION}.apk"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" "$apk_file" dist/release/SHA256SUMS.txt --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$TAG" "$apk_file" dist/release/SHA256SUMS.txt --repo "$GITHUB_REPOSITORY" --target "$GITHUB_SHA" --title "BotBlade $VERSION Debug" --notes-file dist/release/RELEASE_NOTES.md --prerelease
          fi
      - name: Write release summary
        shell: bash
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Debug release summary
          - Version: ${{ steps.version.outputs.version }}
          - Tag: ${{ steps.version.outputs.tag }}
          - APK: bot-blade-debug-v${{ steps.version.outputs.version }}.apk
          EOF

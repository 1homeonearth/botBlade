name: Android

on:
  push:
    branches: [main]
  pull_request:

jobs:
  android-debug-build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.14.3'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Configure Android SDK env & diagnostics
        run: |
          # If the setup action populated ANDROID_SDK_ROOT, make sure the repo and build tools can find it
          if [ -n "${ANDROID_SDK_ROOT:-}" ]; then
            echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
            export ANDROID_HOME="$ANDROID_SDK_ROOT"
          fi

          # Fall back to ANDROID_HOME if set
          if [ -n "${ANDROID_HOME:-}" ]; then
            echo "ANDROID_HOME=$ANDROID_HOME"
          fi

          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT:-}"
          echo "Listing SDK root contents (if present):"
          ls -la "${ANDROID_HOME:-/tmp}" || true
          echo "Listing platforms and build-tools (if present):"
          ls -la "${ANDROID_HOME:-/tmp}/platforms" || true
          ls -la "${ANDROID_HOME:-/tmp}/build-tools" || true

      - name: Install required Android SDK packages
        run: sdkmanager --sdk_root "${ANDROID_SDK_ROOT:-$ANDROID_HOME}" "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Preflight Android SDK packages
        run: ./scripts/android-sdk-preflight.sh

      - name: Compile debug Kotlin
        run: |
          if [ -x ./gradlew ]; then
            ./gradlew :app:compileDebugKotlin --no-daemon --stacktrace
          else
            gradle :app:compileDebugKotlin --stacktrace
          fi

      - name: Assemble debug APK
        run: |
          if [ -x ./gradlew ]; then
            ./gradlew :app:assembleDebug --no-daemon --stacktrace
          else
            gradle :app:assembleDebug --stacktrace
          fi

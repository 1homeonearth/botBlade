name: BotBlade Android APKs

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  android-apk-build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: '8.14.3'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Configure Android SDK env & diagnostics
        run: |
          # If the setup action populated ANDROID_SDK_ROOT, make sure the repo and build tools can find it
          if [ -n "${ANDROID_SDK_ROOT:-}" ]; then
            echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
            export ANDROID_HOME="$ANDROID_SDK_ROOT"
          fi

          # Fall back to ANDROID_HOME if set
          if [ -n "${ANDROID_HOME:-}" ]; then
            echo "ANDROID_HOME=$ANDROID_HOME"
          fi

          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT:-}"
          echo "Listing SDK root contents (if present):"
          ls -la "${ANDROID_HOME:-/tmp}" || true
          echo "Listing platforms and build-tools (if present):"
          ls -la "${ANDROID_HOME:-/tmp}/platforms" || true
          ls -la "${ANDROID_HOME:-/tmp}/build-tools" || true

      - name: Install required Android SDK packages
        run: |
          export ANDROID_SDK_ROOT="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Preflight Android SDK packages
        run: ./scripts/android-sdk-preflight.sh

      - name: Compile debug Kotlin
        run: |
          if [ -x ./gradlew ]; then
            ./gradlew :app:compileDebugKotlin --no-daemon --stacktrace
          else
            gradle :app:compileDebugKotlin --stacktrace
          fi

      - name: Assemble debug and release APKs
        run: |
          if [ -x ./gradlew ]; then
            ./gradlew :app:assembleDebug :app:assembleRelease --no-daemon --stacktrace
          else
            gradle :app:assembleDebug :app:assembleRelease --stacktrace
          fi

      - name: Stage APK outputs
        run: |
          mkdir -p dist/apk
          cp app/build/outputs/apk/debug/app-debug.apk dist/apk/botBlade-debug.apk
          cp app/build/outputs/apk/release/app-release-unsigned.apk dist/apk/botBlade-release-unsigned.apk
          sha256sum dist/apk/*.apk | tee dist/apk/SHA256SUMS.txt

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: botBlade-apks-${{ github.sha }}
          path: dist/apk/*
          if-no-files-found: error
          retention-days: 30

      - name: Publish tagged GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          {
            echo "Automated botBlade APK release for $TAG_NAME."
            echo
            echo "Download files attached to this release:"
            echo "- botBlade-debug.apk — debug APK for local testing."
            echo "- botBlade-release-unsigned.apk — unsigned release APK; signing is still required before store distribution."
            echo "- SHA256SUMS.txt — checksums for the APK files."
          } > release-notes.md

          if gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" dist/apk/* --repo "$GITHUB_REPOSITORY" --clobber
            gh release edit "$TAG_NAME" --repo "$GITHUB_REPOSITORY" --title "botBlade $TAG_NAME" --notes-file release-notes.md --latest
          else
            gh release create "$TAG_NAME" dist/apk/* \
              --repo "$GITHUB_REPOSITORY" \
              --title "botBlade $TAG_NAME" \
              --notes-file release-notes.md \
              --latest
          fi

name: BotBlade Android APKs

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, closed]
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_mode:
        description: build-only | prerelease | versioned-release
        required: true
        default: build-only
        type: choice
        options: [build-only, prerelease, versioned-release]
      release_tag:
        description: Required for versioned-release, for example v1.2.3
        required: false
        type: string

concurrency:
  group: android-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref_name || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint-workflow:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4
      - name: Lint android workflow
        uses: reviewdog/action-actionlint@v1
        with:
          actionlint_flags: .github/workflows/android.yml
          fail_level: error

  preflight:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should_release: ${{ steps.mode.outputs.should_release }}
      release_kind: ${{ steps.mode.outputs.release_kind }}
      release_tag: ${{ steps.mode.outputs.release_tag }}
      is_tag_release: ${{ steps.mode.outputs.is_tag_release }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate repository and workflow preconditions
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -x ./gradlew ]; then
            echo '::warning::Missing executable ./gradlew; workflow will fall back to system gradle.'
          fi
          [ -f app/build.gradle.kts ] || { echo '::error::Missing app/build.gradle.kts.'; exit 1; }
          [ -f .github/workflows/android.yml ] || { echo '::error::Missing workflow file .github/workflows/android.yml.'; exit 1; }
          [ -d app/src/main ] || { echo '::error::Missing Android source directory app/src/main.'; exit 1; }
          if [ -f ./gradlew ]; then chmod +x ./gradlew; fi
          if [ -f dist/apk/SHA256SUMS.txt ]; then
            echo '::error::dist/apk/SHA256SUMS.txt exists before final asset selection. Remove checked-in generated artifacts.'
            exit 1
          fi
          echo '::notice::Preflight checks passed.'
      - id: mode
        name: Resolve release mode
        shell: bash
        env:
          INPUT_RELEASE_MODE: ${{ github.event.inputs.release_mode }}
          INPUT_RELEASE_TAG: ${{ github.event.inputs.release_tag }}
        run: |
          set -euo pipefail
          SHOULD_RELEASE=false
          RELEASE_KIND=none
          RELEASE_TAG=''
          IS_TAG_RELEASE=false

          if [[ "${GITHUB_EVENT_NAME}" == 'push' && "${GITHUB_REF}" == 'refs/heads/main' ]]; then
            SHOULD_RELEASE=true
            RELEASE_KIND=prerelease
            RELEASE_TAG=latest
          elif [[ "${GITHUB_EVENT_NAME}" == 'pull_request' && "${{ github.event.action }}" == 'closed' && "${{ github.event.pull_request.merged }}" == 'true' && "${{ github.event.pull_request.base.ref }}" == 'main' ]]; then
            SHOULD_RELEASE=true
            RELEASE_KIND=prerelease
            RELEASE_TAG=latest
          elif [[ "${GITHUB_EVENT_NAME}" == 'push' && "${GITHUB_REF}" == refs/tags/v* ]]; then
            SHOULD_RELEASE=true
            RELEASE_KIND=versioned
            RELEASE_TAG="${GITHUB_REF_NAME}"
            IS_TAG_RELEASE=true
          elif [[ "${GITHUB_EVENT_NAME}" == 'workflow_dispatch' ]]; then
            MODE="${INPUT_RELEASE_MODE:-}"
            INPUT_TAG="${INPUT_RELEASE_TAG:-}"
            case "$MODE" in
              build-only) ;;
              prerelease)
                SHOULD_RELEASE=true
                RELEASE_KIND=prerelease
                RELEASE_TAG=latest
                ;;
              versioned-release)
                if [[ ! "$INPUT_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
                  echo '::error::workflow_dispatch versioned-release requires release_tag like v1.2.3 or v1.2.3-rc.1'
                  exit 1
                fi
                SHOULD_RELEASE=true
                RELEASE_KIND=versioned
                RELEASE_TAG="$INPUT_TAG"
                IS_TAG_RELEASE=true
                ;;
              *)
                echo "::error::Unsupported release_mode: $MODE"
                exit 1
                ;;
            esac
          fi

          {
            echo "should_release=$SHOULD_RELEASE"
            echo "release_kind=$RELEASE_KIND"
            echo "release_tag=$RELEASE_TAG"
            echo "is_tag_release=$IS_TAG_RELEASE"
          } >> "$GITHUB_OUTPUT"

  build:
    runs-on: ubuntu-latest
    needs: [lint-workflow, preflight]
    permissions:
      contents: read
    outputs:
      app_version_name: ${{ steps.meta.outputs.app_version_name }}
      app_version_code: ${{ steps.meta.outputs.app_version_code }}
      short_sha: ${{ steps.meta.outputs.short_sha }}
      debug_file: ${{ steps.meta.outputs.debug_file }}
      release_unsigned_file: ${{ steps.meta.outputs.release_unsigned_file }}
      release_signed_file: ${{ steps.meta.outputs.release_signed_file }}
      signing_status: ${{ steps.sign_status.outputs.signing_status }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - uses: android-actions/setup-android@v3
      - name: Install Android SDK packages
        shell: bash
        run: |
          set -euo pipefail
          sdkmanager 'platforms;android-35' 'build-tools;35.0.0' 'platform-tools'
      - name: Extract app metadata
        id: meta
        shell: bash
        env:
          IS_TAG_RELEASE: ${{ needs.preflight.outputs.is_tag_release }}
          RELEASE_TAG: ${{ needs.preflight.outputs.release_tag }}
          VERSION_SEQ: ${{ github.run_number }}
        run: |
          set -euo pipefail
          if [ -x ./gradlew ]; then
            METADATA_OUTPUT="$(./gradlew -q :app:printResolvedVersionMetadata -PVERSION_SEQ="$VERSION_SEQ" --no-daemon)"
          else
            METADATA_OUTPUT="$(gradle -q :app:printResolvedVersionMetadata -PVERSION_SEQ="$VERSION_SEQ" --no-daemon)"
          fi
          VERSION_NAME="$(printf '%s\n' "$METADATA_OUTPUT" | sed -n 's/^VERSION_NAME=//p' | tail -n1)"
          VERSION_CODE="$(printf '%s\n' "$METADATA_OUTPUT" | sed -n 's/^VERSION_CODE=//p' | tail -n1)"
          SHORT_SHA="${GITHUB_SHA::7}"
          if [[ -z "$VERSION_NAME" || -z "$VERSION_CODE" ]]; then
            echo '::error::Failed to extract VERSION_NAME/VERSION_CODE from Gradle output.'
            printf '%s\n' "$METADATA_OUTPUT"
            exit 1
          fi
          if [[ "$IS_TAG_RELEASE" == 'true' && "$RELEASE_TAG" != "v${VERSION_NAME}" ]]; then
            echo "::error::Tag $RELEASE_TAG conflicts with versionName $VERSION_NAME"
            exit 1
          fi
          {
            echo "app_version_name=$VERSION_NAME"
            echo "app_version_code=$VERSION_CODE"
            echo "short_sha=$SHORT_SHA"
            echo "debug_file=bot-blade-v${VERSION_NAME}-${VERSION_CODE}-${SHORT_SHA}-debug.apk"
            echo "release_unsigned_file=bot-blade-v${VERSION_NAME}-${VERSION_CODE}-${SHORT_SHA}-release-unsigned.apk"
            echo "release_signed_file=bot-blade-v${VERSION_NAME}-${VERSION_CODE}-${SHORT_SHA}-release-signed.apk"
          } >> "$GITHUB_OUTPUT"
      - name: Build debug and release APKs
        shell: bash
        env:
          VERSION_SEQ: ${{ github.run_number }}
        run: |
          set -euo pipefail
          if [ -x ./gradlew ]; then
            ./gradlew :app:assembleDebug :app:assembleRelease -PVERSION_SEQ="$VERSION_SEQ" --no-daemon --stacktrace
          else
            gradle :app:assembleDebug :app:assembleRelease -PVERSION_SEQ="$VERSION_SEQ" --no-daemon --stacktrace
          fi
      - name: Stage APKs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/apk
          DEBUG_APK=app/build/outputs/apk/prod/debug/app-prod-debug.apk
          RELEASE_UNSIGNED_APK=app/build/outputs/apk/prod/release/app-prod-release-unsigned.apk
          [[ -f "$DEBUG_APK" ]] || { echo "::error::Missing debug APK: $DEBUG_APK"; exit 1; }
          [[ -f "$RELEASE_UNSIGNED_APK" ]] || { echo "::error::Missing unsigned release APK: $RELEASE_UNSIGNED_APK"; exit 1; }
          cp "$DEBUG_APK" "dist/apk/${{ steps.meta.outputs.debug_file }}"
          cp "$RELEASE_UNSIGNED_APK" "dist/apk/${{ steps.meta.outputs.release_unsigned_file }}"
      - name: Resolve signing status
        id: sign_status
        shell: bash
        run: echo 'signing_status=skipped' >> "$GITHUB_OUTPUT"
      - name: Generate checksum manifest
        shell: bash
        run: |
          set -euo pipefail
          (cd dist/apk && sha256sum -- ./*.apk > SHA256SUMS.txt)
      - uses: actions/upload-artifact@v4
        with:
          name: botBlade-v${{ steps.meta.outputs.app_version_name }}-${{ steps.meta.outputs.app_version_code }}-${{ steps.meta.outputs.short_sha }}-debug-apk
          path: dist/apk/${{ steps.meta.outputs.debug_file }}
          retention-days: 14
      - uses: actions/upload-artifact@v4
        with:
          name: botBlade-v${{ steps.meta.outputs.app_version_name }}-${{ steps.meta.outputs.app_version_code }}-${{ steps.meta.outputs.short_sha }}-release-unsigned-apk
          path: dist/apk/${{ steps.meta.outputs.release_unsigned_file }}
          retention-days: 14
      - uses: actions/upload-artifact@v4
        with:
          name: botBlade-v${{ steps.meta.outputs.app_version_name }}-${{ steps.meta.outputs.app_version_code }}-${{ steps.meta.outputs.short_sha }}-checksums
          path: dist/apk/SHA256SUMS.txt
          retention-days: 14
      - name: Write workflow summary
        shell: bash
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Android build summary
          - Debug APK built: yes
          - Unsigned release APK built: yes
          - App version name: ${{ steps.meta.outputs.app_version_name }}
          - App version code: ${{ steps.meta.outputs.app_version_code }}
          EOF

  pr-comment-on-success:
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'pull_request' && needs.build.result == 'success'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const marker = '<!-- bot-blade-apk-build-comment -->';
            const body = `${marker}\n✅ **APK build succeeded**\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, { owner: context.repo.owner, repo: context.repo.repo, issue_number });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body });
            else await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number, body });

  release:
    runs-on: ubuntu-latest
    needs: [lint-workflow, preflight, build]
    if: needs.preflight.outputs.should_release == 'true'
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/incoming
      - name: Prepare release assets
        shell: bash
        env:
          SIGNING_STATUS: ${{ needs.build.outputs.signing_status }}
          RELEASE_KIND: ${{ needs.preflight.outputs.release_kind }}
        run: |
          set -euo pipefail
          mkdir -p dist/release
          cp dist/incoming/*/*.apk dist/release/
          if [[ "$SIGNING_STATUS" != 'signed' && "$RELEASE_KIND" == 'versioned' ]]; then
            echo '::error::Versioned release requires signing configuration.'
            exit 1
          fi
          cp "dist/release/${{ needs.build.outputs.release_unsigned_file }}" dist/release/bot-blade-release-unsigned.apk
          cp "dist/release/${{ needs.build.outputs.debug_file }}" dist/release/bot-blade-debug.apk
          (cd dist/release && sha256sum -- *.apk > SHA256SUMS.txt)
          cat > dist/release/INSTALL.md <<'EOF'
          # Install BotBlade on Android

          Download the APK from this release and open it on your Android device. Debug APKs are for testers and developers.
          EOF
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.preflight.outputs.release_tag }}
          name: BotBlade Android v${{ needs.build.outputs.app_version_name }}
          prerelease: ${{ needs.preflight.outputs.release_kind == 'prerelease' }}
          files: |
            dist/release/*.apk
            dist/release/SHA256SUMS.txt
            dist/release/INSTALL.md

  pr-comment-on-failure:
    runs-on: ubuntu-latest
    needs: [lint-workflow, build]
    if: github.event_name == 'pull_request' && needs.build.result == 'failure'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const marker = '<!-- bot-blade-apk-build-comment -->';
            const body = `${marker}\n❌ **APK build failed**\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, { owner: context.repo.owner, repo: context.repo.repo, issue_number });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body });
            else await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number, body });

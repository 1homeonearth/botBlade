name: Royal Scepter Android APKs

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_mode:
        description: "build-only | prerelease | versioned-release"
        required: true
        default: build-only
        type: choice
        options: [build-only, prerelease, versioned-release]
      release_tag:
        description: "Required for versioned-release (example: v1.2.3)"
        required: false
        type: string

concurrency:
  group: android-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref_name || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  preflight:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should_release: ${{ steps.mode.outputs.should_release }}
      release_kind: ${{ steps.mode.outputs.release_kind }}
      release_tag: ${{ steps.mode.outputs.release_tag }}
      is_tag_release: ${{ steps.mode.outputs.is_tag_release }}
    steps:
      - uses: actions/checkout@v5
      - name: Validate repository and workflow preconditions
        shell: bash
        run: |
          set -euo pipefail
          [ -f ./gradlew ] || { echo "::error::Missing ./gradlew at repository root."; exit 1; }
          [ -f app/build.gradle.kts ] || { echo "::error::Missing app/build.gradle.kts."; exit 1; }
          [ -f .github/workflows/android.yml ] || { echo "::error::Missing workflow file .github/workflows/android.yml."; exit 1; }
          [ -d app/src/main ] || { echo "::error::Missing Android source directory app/src/main."; exit 1; }
          chmod +x ./gradlew
          if [ -f dist/apk/SHA256SUMS.txt ]; then
            echo "::error::dist/apk/SHA256SUMS.txt exists before final asset selection. Remove checked-in generated artifacts.";
            exit 1;
          fi
          echo "::notice::Preflight checks passed."
      - id: mode
        name: Resolve release mode
        shell: bash
        run: |
          set -euo pipefail
          SHOULD_RELEASE=false
          RELEASE_KIND=none
          RELEASE_TAG=""
          IS_TAG_RELEASE=false

          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" == "refs/heads/main" ]]; then
            SHOULD_RELEASE=true
            RELEASE_KIND=prerelease
            RELEASE_TAG="latest"
          elif [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" == refs/tags/v* ]]; then
            SHOULD_RELEASE=true
            RELEASE_KIND=versioned
            RELEASE_TAG="${GITHUB_REF_NAME}"
            IS_TAG_RELEASE=true
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            MODE="${{ github.event.inputs.release_mode }}"
            INPUT_TAG="${{ github.event.inputs.release_tag }}"
            case "$MODE" in
              build-only) ;;
              prerelease)
                SHOULD_RELEASE=true
                RELEASE_KIND=prerelease
                RELEASE_TAG="latest"
                ;;
              versioned-release)
                if [[ -z "$INPUT_TAG" || ! "$INPUT_TAG" =~ ^v ]]; then
                  echo "::error::workflow_dispatch versioned-release requires release_tag starting with v";
                  exit 1
                fi
                SHOULD_RELEASE=true
                RELEASE_KIND=versioned
                RELEASE_TAG="$INPUT_TAG"
                IS_TAG_RELEASE=true
                ;;
              *)
                echo "::error::Unsupported release_mode: $MODE"; exit 1 ;;
            esac
          fi

          echo "should_release=$SHOULD_RELEASE" >> "$GITHUB_OUTPUT"
          echo "release_kind=$RELEASE_KIND" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "is_tag_release=$IS_TAG_RELEASE" >> "$GITHUB_OUTPUT"

  build:
    runs-on: ubuntu-latest
    needs: preflight
    permissions:
      contents: read
      actions: read
      pull-requests: write
    outputs:
      app_version_name: ${{ steps.meta.outputs.app_version_name }}
      app_version_code: ${{ steps.meta.outputs.app_version_code }}
      short_sha: ${{ steps.meta.outputs.short_sha }}
      debug_file: ${{ steps.meta.outputs.debug_file }}
      release_unsigned_file: ${{ steps.meta.outputs.release_unsigned_file }}
      release_signed_file: ${{ steps.meta.outputs.release_signed_file }}
      signing_status: ${{ steps.sign_status.outputs.signing_status }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v5
      - uses: android-actions/setup-android@v4
      - name: Install Android SDK packages
        shell: bash
        run: |
          set -euo pipefail
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"
      - name: Extract app metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          VERSION_NAME=$(awk -F'"' '/versionName =/{print $2; exit}' app/build.gradle.kts)
          VERSION_CODE=$(awk '/versionCode =/{for(i=1;i<=NF;i++) if($i ~ /^[0-9]+$/){print $i; exit}}' app/build.gradle.kts)
          SHORT_SHA="${GITHUB_SHA::7}"
          if [[ -z "$VERSION_NAME" || -z "$VERSION_CODE" ]]; then
            echo "::warning::Formal version metadata unavailable; artifact naming will fall back to short SHA only."
            VERSION_NAME="unknown"
            VERSION_CODE="0"
          fi
          if [[ "${{ needs.preflight.outputs.is_tag_release }}" == "true" && "$VERSION_NAME" != "unknown" ]]; then
            if [[ "${{ needs.preflight.outputs.release_tag }}" != "v${VERSION_NAME}" ]]; then
              echo "::error::Tag ${{ needs.preflight.outputs.release_tag }} conflicts with versionName $VERSION_NAME"; exit 1
            fi
          fi
          echo "app_version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "app_version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "debug_file=royal-scepter-v${VERSION_NAME}-${VERSION_CODE}-${SHORT_SHA}-debug.apk" >> "$GITHUB_OUTPUT"
          echo "release_unsigned_file=royal-scepter-v${VERSION_NAME}-${VERSION_CODE}-${SHORT_SHA}-release-unsigned.apk" >> "$GITHUB_OUTPUT"
          echo "release_signed_file=royal-scepter-v${VERSION_NAME}-${VERSION_CODE}-${SHORT_SHA}-release-signed.apk" >> "$GITHUB_OUTPUT"
      - name: Build debug and release APKs
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew :app:assembleDebug :app:assembleRelease --no-daemon --stacktrace
      - name: Stage APKs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/apk
          cp app/build/outputs/apk/debug/app-debug.apk "dist/apk/${{ steps.meta.outputs.debug_file }}"
          cp app/build/outputs/apk/release/app-release-unsigned.apk "dist/apk/${{ steps.meta.outputs.release_unsigned_file }}"
      - name: Sign release APK when secrets are available
        id: sign
        if: secrets.KEYSTORE_BASE64 != '' && secrets.KEYSTORE_PASSWORD != '' && secrets.KEY_ALIAS != ''
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          set -euo pipefail
          echo "$KEYSTORE_BASE64" | base64 -d > /tmp/release.keystore
          apksigner sign --ks /tmp/release.keystore --ks-key-alias "$KEY_ALIAS" --ks-pass pass:"$KEYSTORE_PASSWORD" --key-pass pass:"$KEYSTORE_PASSWORD" \
            --out "dist/apk/${{ steps.meta.outputs.release_signed_file }}" "dist/apk/${{ steps.meta.outputs.release_unsigned_file }}"
          apksigner verify --verbose --print-certs "dist/apk/${{ steps.meta.outputs.release_signed_file }}" | tee dist/apk/apksigner-verify.txt
          rm -f /tmp/release.keystore
          echo "signing_status=signed" >> "$GITHUB_OUTPUT"
      - name: Resolve signing status
        id: sign_status
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ steps.sign.outcome }}" == "success" ]]; then
            echo "signing_status=signed" >> "$GITHUB_OUTPUT"
          else
            echo "signing_status=skipped" >> "$GITHUB_OUTPUT"
          fi
      - name: Generate PR checksum manifest
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          (cd dist/apk && sha256sum *.apk > SHA256SUMS.txt)
      - uses: actions/upload-artifact@v4
        with:
          name: royalScepter-v${{ steps.meta.outputs.app_version_name }}-${{ steps.meta.outputs.app_version_code }}-${{ steps.meta.outputs.short_sha }}-debug-apk
          path: dist/apk/${{ steps.meta.outputs.debug_file }}
          retention-days: 14
      - uses: actions/upload-artifact@v4
        with:
          name: royalScepter-v${{ steps.meta.outputs.app_version_name }}-${{ steps.meta.outputs.app_version_code }}-${{ steps.meta.outputs.short_sha }}-release-unsigned-apk
          path: dist/apk/${{ steps.meta.outputs.release_unsigned_file }}
          retention-days: 14
      - uses: actions/upload-artifact@v4
        if: steps.sign.outputs.signing_status == 'signed'
        with:
          name: royalScepter-v${{ steps.meta.outputs.app_version_name }}-${{ steps.meta.outputs.app_version_code }}-${{ steps.meta.outputs.short_sha }}-release-signed-apk
          path: |
            dist/apk/${{ steps.meta.outputs.release_signed_file }}
            dist/apk/apksigner-verify.txt
          retention-days: 14
      - uses: actions/upload-artifact@v4
        if: github.event_name == 'pull_request'
        with:
          name: royalScepter-v${{ steps.meta.outputs.app_version_name }}-${{ steps.meta.outputs.app_version_code }}-${{ steps.meta.outputs.short_sha }}-checksums
          path: dist/apk/SHA256SUMS.txt
          retention-days: 14
      - name: Write workflow summary
        shell: bash
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Android build summary
          - Debug APK built: yes
          - Unsigned release APK built: yes
          - Signed release APK built: ${{ steps.sign_status.outputs.signing_status == 'signed' && 'yes' || 'no' }}
          - App version name: ${{ steps.meta.outputs.app_version_name }}
          - App version code: ${{ steps.meta.outputs.app_version_code }}
          - Commit SHA: $GITHUB_SHA
          - Artifact names:
            - royalScepter-v${{ steps.meta.outputs.app_version_name }}-${{ steps.meta.outputs.app_version_code }}-${{ steps.meta.outputs.short_sha }}-debug-apk
            - royalScepter-v${{ steps.meta.outputs.app_version_name }}-${{ steps.meta.outputs.app_version_code }}-${{ steps.meta.outputs.short_sha }}-release-unsigned-apk
          - Downloads: Use this run's **Artifacts** section. Debug APK is for testers; unsigned release APK is test-only.
          EOF
      - name: Sticky PR artifact comment (best effort)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        continue-on-error: true
        with:
          script: |
            const marker = '<!-- royal-scepter-apk-build-comment -->';
            const body = `${marker}
            ✅ **APK build succeeded**
            - \`royalScepter-v${{ steps.meta.outputs.app_version_name }}-${{ steps.meta.outputs.app_version_code }}-${{ steps.meta.outputs.short_sha }}-debug-apk\`
            - \`royalScepter-v${{ steps.meta.outputs.app_version_name }}-${{ steps.meta.outputs.app_version_code }}-${{ steps.meta.outputs.short_sha }}-release-unsigned-apk\`
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Download the debug APK from this workflow run’s **Artifacts** section.`;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body
              });
            }

  release:
    runs-on: ubuntu-latest
    needs: [preflight, build]
    if: needs.preflight.outputs.should_release == 'true'
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v5
      - name: Download APK artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/incoming
      - name: Select final assets and generate metadata
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/release
          cp dist/incoming/*/*.apk dist/release/
          APP_VERSION_NAME="${{ needs.build.outputs.app_version_name }}"
          APP_VERSION_CODE="${{ needs.build.outputs.app_version_code }}"
          SHORT_SHA="${{ needs.build.outputs.short_sha }}"
          SIGNING_STATUS="${{ needs.build.outputs.signing_status }}"

          DEBUG_VERSIONED="royal-scepter-v${APP_VERSION_NAME}-${APP_VERSION_CODE}-debug.apk"
          cp "dist/release/${{ needs.build.outputs.debug_file }}" "dist/release/${DEBUG_VERSIONED}"
          cp "dist/release/${{ needs.build.outputs.debug_file }}" dist/release/royal-scepter-debug.apk

          if [[ "$SIGNING_STATUS" != "signed" && "${{ needs.preflight.outputs.release_kind }}" == "versioned" ]]; then
            echo "::error::Versioned release requires signing secrets."; exit 1
          fi

          if [[ "$SIGNING_STATUS" == "signed" ]]; then
            SIGNED_VERSIONED="royal-scepter-v${APP_VERSION_NAME}-${APP_VERSION_CODE}-signed.apk"
            cp "dist/release/${{ needs.build.outputs.release_signed_file }}" "dist/release/${SIGNED_VERSIONED}"
            cp "dist/release/${SIGNED_VERSIONED}" dist/release/royal-scepter.apk
            FINAL_APK_ASSETS=("royal-scepter.apk" "$SIGNED_VERSIONED" "royal-scepter-debug.apk" "$DEBUG_VERSIONED")
          else
            cp "dist/release/${{ needs.build.outputs.release_unsigned_file }}" dist/release/royal-scepter-release-unsigned.apk
            FINAL_APK_ASSETS=("royal-scepter-release-unsigned.apk" "royal-scepter-debug.apk" "$DEBUG_VERSIONED")
          fi

          (cd dist/release && sha256sum "${FINAL_APK_ASSETS[@]}" > SHA256SUMS.txt)
          (cd dist/release && sha256sum -c SHA256SUMS.txt)

          cat > dist/release/INSTALL.md <<'EOF'
          # Install Royal Scepter on Android

          1. Download **royal-scepter.apk** from the latest release.
          2. Open the APK on your Android phone.
          3. If asked, allow installs from your browser or file manager.
          4. Continue and install Royal Scepter.
          5. For updates, download the newest **royal-scepter.apk** from the latest release.

          Optional verification: download `SHA256SUMS.txt` and run `sha256sum -c SHA256SUMS.txt`.
          Debug APKs are for testers and developers.
          EOF

          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          python - <<PY
          import json
          from pathlib import Path
          p=Path('dist/release')
          sha={line.split()[1]:line.split()[0] for line in (p/'SHA256SUMS.txt').read_text().splitlines()}
          obj={
            "app_name":"Royal Scepter",
            "repository":"${{ github.repository }}",
            "release_tag":"${{ needs.preflight.outputs.release_tag }}",
            "release_title":f"Royal Scepter Android v${{ needs.build.outputs.app_version_name }}",
            "version_name":"${{ needs.build.outputs.app_version_name }}",
            "version_code":"${{ needs.build.outputs.app_version_code }}",
            "git_commit_sha":"${{ github.sha }}",
            "ref":"${{ github.ref }}",
            "workflow":"${{ github.workflow }}",
            "workflow_run_id":"${{ github.run_id }}",
            "workflow_run_url":RUN_URL,
            "build_timestamp_utc":"$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "signing_status":"${{ needs.build.outputs.signing_status }}",
            "apk_sha256":sha
          }
          (p/'release.json').write_text(json.dumps(obj, indent=2)+"\\n")
          PY

          RELEASE_ASSETS=("SHA256SUMS.txt" "release.json" "INSTALL.md")
          for f in "${FINAL_APK_ASSETS[@]}"; do RELEASE_ASSETS+=("$f"); done
          printf '%s\n' "${RELEASE_ASSETS[@]}" > dist/release/release-assets.txt
      - name: Create artifact attestations
        if: needs.build.outputs.signing_status == 'signed'
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/release/royal-scepter.apk
            dist/release/SHA256SUMS.txt
            dist/release/release.json
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ needs.preflight.outputs.release_tag }}"
          TITLE="Royal Scepter Android v${{ needs.build.outputs.app_version_name }}"
          NOTES_FILE=dist/release/notes.md
          cat > "$NOTES_FILE" <<EOF
          | File | Who it is for |
          | --- | --- |
          | royal-scepter.apk | Normal users. Download this. |
          | royal-scepter-v${{ needs.build.outputs.app_version_name }}-${{ needs.build.outputs.app_version_code }}-signed.apk | Same signed release APK with version in the filename. |
          | royal-scepter-debug.apk | Testers and developers only. |
          | royal-scepter-v${{ needs.build.outputs.app_version_name }}-${{ needs.build.outputs.app_version_code }}-debug.apk | Versioned debug APK for testers and developers. |
          | SHA256SUMS.txt | Verifies downloaded APKs. |
          | release.json | Build/version metadata for automation. |
          | INSTALL.md | Android install instructions. |
          EOF

          if [[ "${{ needs.preflight.outputs.release_kind }}" == "prerelease" ]]; then
            RELEASE_FLAG="--prerelease"
          else
            RELEASE_FLAG="--latest"
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            while read -r asset; do gh release upload "$TAG" "dist/release/$asset" --clobber; done < dist/release/release-assets.txt
            gh release edit "$TAG" --title "$TITLE" --notes-file "$NOTES_FILE" "$RELEASE_FLAG"
          else
            ASSETS=(); while read -r asset; do ASSETS+=("dist/release/$asset"); done < dist/release/release-assets.txt
            gh release create "$TAG" "${ASSETS[@]}" --title "$TITLE" --notes-file "$NOTES_FILE" "$RELEASE_FLAG"
          fi
      - name: Release checklist summary
        shell: bash
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Release checklist
          - Signed APK created: ${{ needs.build.outputs.signing_status == 'signed' && 'yes' || 'no' }}
          - Public APK selected: ${{ needs.build.outputs.signing_status == 'signed' && 'royal-scepter.apk' || 'n/a (unsigned flow)' }}
          - SHA256SUMS generated after final asset selection: yes
          - sha256sum -c passed: yes
          - release.json generated and validated: yes
          - INSTALL.md generated: yes
          - Release assets uploaded: yes
          - Artifact attestation generated: ${{ needs.build.outputs.signing_status == 'signed' && 'yes' || 'no' }}
          - Latest release link: ./releases/latest
          - Direct APK download: ./releases/latest/download/royal-scepter.apk
          EOF

  pr-comment-on-failure:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request' && needs.build.result == 'failure'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Sticky PR failure comment (best effort)
        uses: actions/github-script@v8
        continue-on-error: true
        with:
          script: |
            const marker = '<!-- royal-scepter-apk-build-comment -->';
            const body = `${marker}
            ❌ **APK build failed**
            - Failed job: build
            - First actionable step: check the failing step logs in the build job.
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body
              });
            }

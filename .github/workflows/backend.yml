name: Backend

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: Backend build and test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4, Node 20
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4, Node 20
        with:
          node-version: '22'
      - run: npm install
      - run: npm run preflight:node
      - run: npm run build
      - run: npm test

name: Backend

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: Backend build and test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git init .
          git fetch --no-tags --depth=1 "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "${GITHUB_SHA}"
          git checkout --force FETCH_HEAD
      - name: Verify Node runtime
        shell: bash
        run: |
          set -euo pipefail
          node --version
          npm --version
      - name: Install backend dependencies
        shell: bash
        working-directory: backend
        run: npm install
      - name: Run backend preflight
        shell: bash
        working-directory: backend
        run: npm run preflight:node
      - name: Build backend
        shell: bash
        working-directory: backend
        run: npm run build
      - name: Test backend
        shell: bash
        working-directory: backend
        run: npm test
